<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ASCII Fishtank</title>
</head>
<body>
<style>
  :root {
    --bg: #04070d;
    --tank: #071019;
    --water: #2b5a6e;
    --water-dim: #1d3f4f;
    --bubble: #7fc4dc;
    --weed: #4e9e6a;
    --gravel: #7d6f52;
    --chest: #b08948;
    --fish-amber: #f0b449;
    --fish-coral: #e8735a;
    --fish-mint: #6fd0a8;
    --fish-silver: #c2d2de;
    --fish-big: #b48ae0;
    --crab: #e0564a;
    --jelly: #e39ec9;
    --chrome: #3a5566;
    --chrome-bright: #6f95a8;
    --food: #e0cfa0;
  }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--water);
    font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100%;
  }
  .rig {
    width: min(96vw, 118ch);
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0 2px 6px;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--chrome);
  }
  header .name { color: var(--chrome-bright); }
  header .tele { font-variant-numeric: tabular-nums; }
  .tankwrap {
    background: linear-gradient(180deg, #081521 0%, var(--tank) 30%, #060d14 100%);
    border: 1px solid #14293a;
    border-radius: 6px;
    padding: 10px 8px;
    box-shadow: 0 0 40px rgba(30, 90, 120, 0.12) inset, 0 8px 30px rgba(0,0,0,0.5);
    overflow: hidden;
    cursor: pointer;
  }
  .tankwrap:focus-visible {
    outline: 2px solid var(--chrome-bright);
    outline-offset: 3px;
  }
  pre {
    margin: 0;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.12;
    user-select: none;
    text-shadow: 0 0 6px rgba(90, 170, 200, 0.10);
  }
  footer {
    display: flex;
    justify-content: space-between;
    padding: 6px 2px 0;
    font-size: 12px;
    letter-spacing: 0.06em;
    color: var(--chrome);
    font-variant-numeric: tabular-nums;
  }
  .w  { color: var(--water); }
  .wd { color: var(--water-dim); }
  .b  { color: var(--bubble); }
  .s  { color: var(--weed); }
  .g  { color: var(--gravel); }
  .c  { color: var(--chest); }
  .f1 { color: var(--fish-amber);  text-shadow: 0 0 8px rgba(240,180,73,0.35); }
  .f2 { color: var(--fish-coral);  text-shadow: 0 0 8px rgba(232,115,90,0.35); }
  .f3 { color: var(--fish-mint);   text-shadow: 0 0 8px rgba(111,208,168,0.35); }
  .f4 { color: var(--fish-silver); text-shadow: 0 0 8px rgba(194,210,222,0.30); }
  .f5 { color: var(--fish-big);    text-shadow: 0 0 10px rgba(180,138,224,0.45); }
  .cr { color: var(--crab);        text-shadow: 0 0 8px rgba(224,86,74,0.40); }
  .j  { color: var(--jelly);       text-shadow: 0 0 10px rgba(227,158,201,0.45); }
  .p  { color: var(--food); }
  @media (max-width: 700px) {
    pre { font-size: 11px; }
  }
</style>

<div class="rig">
  <header>
    <span class="name">fishtank v1.3</span>
    <span class="tele">temp 24.1°C &nbsp; ph 7.2 &nbsp; o₂ ok</span>
  </header>
  <div class="tankwrap" id="wrap" tabindex="0" role="img" aria-label="Animated ASCII art fishtank: fish swim among rising bubbles, swaying seaweed, and a treasure chest, while a big fish occasionally hunts and swallows a smaller one, a crab patrols the gravel eating fallen crumbs, and jellyfish pulse and drift through the mid-water. Click or press Enter to drop food.">
    <pre id="tank" aria-hidden="true"></pre>
  </div>
  <footer>
    <span id="census">fish 7 &nbsp; bubbles 0</span>
    <span id="hint">click tank to feed</span>
  </footer>
</div>

<script>
(function () {
  const pre = document.getElementById('tank');
  const wrap = document.getElementById('wrap');
  const census = document.getElementById('census');
  const hint = document.getElementById('hint');
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let W = 100, H = 32;
  let cellW = 8, cellH = 16;
  let t = 0;
  let gravel = [];   // static rows of chars
  let weeds = [];    // {x, h, phase}
  let fishes = [];
  let bubbles = [];  // {x, y, vy, phase, age}
  let flakes = [];   // {x, y, phase}
  let pred = null;   // the big fish
  let gulps = 0;
  let respawns = []; // countdown ticks until an eaten fish re-enters
  let crab = null;   // gravel janitor
  let crumbs = [];   // {x, ttl} — flakes that reached the bottom
  let jellies = [];  // {x, y, vx, phase, wander, puff}

  const SPRITES = [
    { r: '><(((º>', l: '<º)))><' },
    { r: "><((('>", l: "<')))><" },
    { r: '><>',     l: '<><'     },
  ];
  const COLORS = ['f1', 'f2', 'f3', 'f4'];

  const BIG = {
    r:    '><((((((((º>',  l:    '<º))))))))><',
    rFed: '><((((@((((º>', lFed: '<º))))@))))><',
  };
  const FLEE_R = 11;   // small fish panic inside this radius
  const HUNT_SPEED = 3.4, FLEE_SPEED = 1.45;

  const CRAB = { a: '(\\/)°.°(\\/)', b: '(/\\)°.°(/\\)' };
  const CRAB_W = CRAB.a.length;

  const JELLY = {
    open: [' .-. ', '(   )', ' \\|/ '],
    puff: ['  _  ', ' (_) ', ' )|( '],
  };
  const JELLY_W = 5, JELLY_H = 3;
  const JELLY_BEAT = 70;   // ticks per pulse cycle
  const JELLY_KICK = 14;   // contraction ticks at the start of each beat

  const CHEST = [
    '  ____  ',
    ' /_--_\\ ',
    ' |_||_| ',
  ];

  function measure() {
    const probe = document.createElement('span');
    probe.textContent = 'MMMMMMMMMM';
    probe.style.cssText = 'position:absolute;visibility:hidden;white-space:pre;';
    pre.appendChild(probe);
    const r = probe.getBoundingClientRect();
    cellW = r.width / 10;
    const style = getComputedStyle(pre);
    cellH = parseFloat(style.fontSize) * parseFloat(style.lineHeight) || r.height;
    pre.removeChild(probe);
  }

  function sizeGrid() {
    measure();
    const inner = wrap.clientWidth - 16;
    W = Math.max(48, Math.min(116, Math.floor(inner / cellW)));
    H = window.innerWidth < 700 ? 26 : 32;
    seedScenery();
  }

  function seedScenery() {
    // Gravel: two static rows, seeded once so it doesn't shimmer.
    const bed = '.,:;*\'`·';
    gravel = [];
    for (let row = 0; row < 2; row++) {
      let line = [];
      for (let x = 0; x < W; x++) {
        line.push(bed[Math.floor(Math.random() * bed.length)]);
      }
      gravel.push(line);
    }
    // Seaweed clumps near the sides and one mid-tank.
    weeds = [];
    const spots = [3, 6, Math.floor(W * 0.45), W - 7, W - 4];
    for (const x of spots) {
      weeds.push({
        x,
        h: 4 + Math.floor(Math.random() * 5),
        phase: Math.random() * Math.PI * 2,
      });
    }
    for (const f of fishes) {
      f.baseY = Math.min(f.baseY, H - 6);
    }
    if (pred) pred.baseY = Math.min(pred.baseY, H - 7);
    for (const j of jellies) {
      j.x = Math.max(1, Math.min(W - JELLY_W - 1, j.x));
      j.y = Math.min(j.y, H - 5 - JELLY_H);
    }
  }

  function makeFish(i, fromEdge) {
    const sprite = SPRITES[i % SPRITES.length];
    const dir = Math.random() < 0.5 ? 1 : -1;
    return {
      sprite,
      cls: COLORS[i % COLORS.length],
      x: fromEdge ? (dir > 0 ? -sprite.r.length - 2 : W + 2) : Math.random() * W,
      baseY: 3 + Math.random() * (H - 10),
      vx: dir * (0.25 + Math.random() * 0.3),
      wob: 0.04 + Math.random() * 0.05,
      phase: Math.random() * Math.PI * 2,
      drift: 0,
    };
  }

  function seedFish() {
    fishes = [];
    for (let i = 0; i < 7; i++) fishes.push(makeFish(i, false));
  }

  function seedPred() {
    pred = {
      x: -BIG.r.length - 4,
      baseY: 4 + Math.random() * (H - 12),
      vx: 0.18,
      drift: 0,
      wob: 0.025,
      phase: Math.random() * Math.PI * 2,
      mode: 'cruise',
      hunger: 250,     // ticks until the next hunt
      stamina: 0,      // remaining hunt ticks before giving up
      fed: 0,          // belly-bulge timer
    };
  }

  function seedJellies() {
    jellies = [];
    for (let i = 0; i < 2; i++) {
      jellies.push({
        x: W * (0.25 + i * 0.45) + Math.random() * 6 - 3,
        y: 4 + Math.random() * (H - 16),
        vx: (Math.random() < 0.5 ? -1 : 1) * 0.04,
        phase: Math.floor(Math.random() * JELLY_BEAT),
        wander: Math.random() * Math.PI * 2,
        puff: false,
      });
    }
  }

  function seedCrab() {
    crab = {
      x: Math.floor(W * 0.3),
      dir: 1,
      pause: 0,
    };
  }

  function blank() {
    const grid = new Array(H);
    for (let y = 0; y < H; y++) {
      grid[y] = new Array(W);
      for (let x = 0; x < W; x++) grid[y][x] = null;
    }
    return grid;
  }

  function put(grid, x, y, ch, cls) {
    x = Math.round(x); y = Math.round(y);
    if (x < 0 || x >= W || y < 0 || y >= H || ch === ' ') return;
    grid[y][x] = { ch, cls };
  }

  function putText(grid, x, y, text, cls) {
    for (let i = 0; i < text.length; i++) put(grid, x + i, y, text[i], cls);
  }

  function step() {
    t++;

    // Bubbles from the chest's gap, occasionally.
    if (t % 22 === 0) {
      bubbles.push({ x: Math.floor(W * 0.72) + 3, y: H - 4, phase: Math.random() * 6, age: 0 });
    }

    // Fish
    for (const f of fishes) {
      let speed = f.vx;
      // Panic beats appetite: flee if the big fish is close.
      const px = pred ? pred.x + BIG.r.length / 2 : -1e9;
      const py = pred ? pred.baseY + pred.drift : 0;
      const fy = f.baseY + f.drift;
      const fleeing = pred && Math.abs(f.x - px) < FLEE_R && Math.abs(fy - py) < 5;
      // Chase the nearest flake if one is close.
      let target = null, best = 1e9;
      for (const fl of flakes) {
        const d = Math.abs(fl.x - f.x) + Math.abs(fl.y - (f.baseY + f.drift)) * 2;
        if (d < best && d < 50) { best = d; target = fl; }
      }
      if (fleeing) {
        const away = Math.sign(f.x - px) || 1;
        f.vx = away * Math.abs(f.vx);
        speed = f.vx * FLEE_SPEED;
        f.drift += Math.sign(fy - py || 1) * 0.18;
        f.drift = Math.max(2 - f.baseY, Math.min(H - 5 - f.baseY, f.drift));
      } else if (target) {
        const want = Math.sign(target.x - f.x) || f.vx > 0 ? Math.sign(target.x - f.x) : 1;
        if (want !== 0) f.vx = want * Math.abs(f.vx);
        speed = f.vx * 1.8;
        f.drift += (target.y - f.baseY - f.drift) * 0.08;
        const mouthX = f.vx > 0 ? f.x + f.sprite.r.length : f.x;
        if (Math.abs(target.x - mouthX) < 2.5 && Math.abs(target.y - (f.baseY + f.drift)) < 1.5) {
          flakes.splice(flakes.indexOf(target), 1);
          bubbles.push({ x: mouthX, y: f.baseY + f.drift - 1, phase: 0, age: 0 });
        }
      } else {
        f.drift *= 0.97;
      }
      f.x += speed;
      const wSpr = f.sprite.r.length;
      if (f.vx > 0 && f.x > W + 2) f.x = -wSpr - 2;
      if (f.vx < 0 && f.x < -wSpr - 2) f.x = W + 2;
      // Fish blow a bubble now and then.
      if ((t + Math.floor(f.phase * 40)) % 130 === 0) {
        bubbles.push({ x: f.vx > 0 ? f.x + wSpr : f.x, y: f.baseY + f.drift - 1, phase: Math.random() * 6, age: 0 });
      }
    }

    // The big fish: cruise until hungry, then hunt the nearest small fish.
    if (pred) {
      let speed = pred.vx;
      if (pred.fed > 0) pred.fed--;
      if (pred.mode === 'cruise') {
        pred.hunger--;
        pred.drift *= 0.99;
        if (pred.hunger <= 0 && fishes.length > 2) {
          pred.mode = 'hunt';
          pred.stamina = 200;
        }
      } else {
        pred.stamina--;
        let prey = null, best = 1e9;
        for (const f of fishes) {
          const d = Math.abs(f.x - pred.x) + Math.abs((f.baseY + f.drift) - (pred.baseY + pred.drift)) * 2;
          if (d < best) { best = d; prey = f; }
        }
        if (!prey || pred.stamina <= 0 || fishes.length <= 2) {
          pred.mode = 'cruise';
          pred.hunger = 200 + Math.random() * 200;
        } else {
          const preyX = prey.x + prey.sprite.r.length / 2;
          const preyY = prey.baseY + prey.drift;
          const want = Math.sign(preyX - pred.x - BIG.r.length / 2);
          if (want !== 0) pred.vx = want * Math.abs(pred.vx);
          speed = pred.vx * HUNT_SPEED;
          pred.drift += (preyY - pred.baseY - pred.drift) * 0.07;
          const mouthX = pred.vx > 0 ? pred.x + BIG.r.length : pred.x;
          const mouthY = pred.baseY + pred.drift;
          if (Math.abs(preyX - mouthX) < 3 && Math.abs(preyY - mouthY) < 1.8) {
            fishes.splice(fishes.indexOf(prey), 1);
            gulps++;
            respawns.push(110 + Math.floor(Math.random() * 110));
            for (let k = 0; k < 4; k++) {
              bubbles.push({ x: mouthX + (Math.random() * 4 - 2), y: mouthY - 1, phase: Math.random() * 6, age: 0 });
            }
            pred.fed = 70;
            pred.mode = 'cruise';
            pred.hunger = 350 + Math.random() * 350;
            flash('gulp!');
          }
        }
      }
      pred.x += speed;
      const wSpr = BIG.rFed.length;
      if (pred.vx > 0 && pred.x > W + 3) pred.x = -wSpr - 3;
      if (pred.vx < 0 && pred.x < -wSpr - 3) pred.x = W + 3;
    }

    // The crab patrols the gravel and tidies up crumbs.
    if (crab) {
      const claw = crab.x + CRAB_W / 2;
      let snack = null, best = 1e9;
      for (const c of crumbs) {
        const d = Math.abs(c.x - claw);
        if (d < best) { best = d; snack = c; }
      }
      if (crab.pause > 0 && !snack) {
        crab.pause--;
      } else {
        let sp = 0.12;
        if (snack) {
          crab.dir = Math.sign(snack.x - claw) || crab.dir;
          sp = 0.32;
          if (best < 2) {
            crumbs.splice(crumbs.indexOf(snack), 1);
            bubbles.push({ x: claw, y: H - 4, phase: Math.random() * 6, age: 0 });
            crab.pause = 25;
          }
        } else {
          if (Math.random() < 0.005) crab.dir *= -1;
          if (Math.random() < 0.008) crab.pause = 30 + Math.random() * 60;
        }
        crab.x += crab.dir * sp;
        if (crab.x < 1) { crab.x = 1; crab.dir = 1; }
        if (crab.x > W - CRAB_W - 1) { crab.x = W - CRAB_W - 1; crab.dir = -1; }
      }
    }
    for (let i = crumbs.length - 1; i >= 0; i--) {
      if (--crumbs[i].ttl <= 0) crumbs.splice(i, 1);
    }

    // Jellyfish: contract to kick upward, then drift back down while open.
    for (const j of jellies) {
      const beat = (t + j.phase) % JELLY_BEAT;
      j.puff = beat < JELLY_KICK;
      j.y += j.puff ? -0.22 : 0.045;
      j.x += j.vx + Math.sin(t * 0.02 + j.wander) * 0.05;
      if (j.x < 1) { j.x = 1; j.vx = Math.abs(j.vx); }
      if (j.x > W - JELLY_W - 1) { j.x = W - JELLY_W - 1; j.vx = -Math.abs(j.vx); }
      j.y = Math.max(2, Math.min(H - 5 - JELLY_H, j.y));
      // A stray bubble slips out of the bell on some contractions.
      if (j.puff && beat === 1 && Math.random() < 0.3) {
        bubbles.push({ x: j.x + 2, y: j.y - 1, phase: Math.random() * 6, age: 0 });
      }
    }

    // Eaten fish quietly return from the edges once the coast is clear.
    for (let i = respawns.length - 1; i >= 0; i--) {
      if (--respawns[i] <= 0) {
        respawns.splice(i, 1);
        fishes.push(makeFish(Math.floor(Math.random() * SPRITES.length * COLORS.length), true));
      }
    }

    // Bubbles rise, wobble, pop at the surface.
    for (let i = bubbles.length - 1; i >= 0; i--) {
      const b = bubbles[i];
      b.y -= 0.28;
      b.age++;
      if (b.y <= 1) bubbles.splice(i, 1);
    }

    // Food sinks.
    for (let i = flakes.length - 1; i >= 0; i--) {
      const fl = flakes[i];
      fl.y += 0.12;
      fl.x += Math.sin(t * 0.1 + fl.phase) * 0.08;
      if (fl.y >= H - 3) {
        if (crumbs.length < 12) crumbs.push({ x: fl.x, ttl: 300 });
        flakes.splice(i, 1);
      }
    }
  }

  function render() {
    const grid = blank();

    // Surface ripples.
    for (let x = 0; x < W; x++) {
      const v = Math.sin(x * 0.55 + t * 0.06) + Math.sin(x * 0.13 - t * 0.03);
      if (v > 0.55) put(grid, x, 0, '~', 'w');
      else if (v > -0.2) put(grid, x, 0, '~', 'wd');
    }
    // Sparse mid-water shimmer.
    for (let x = 2; x < W; x += 9) {
      const y = 2 + ((x * 7 + Math.floor(t / 8)) % (H - 8));
      const v = Math.sin(x * 1.7 + t * 0.05);
      if (v > 0.6) put(grid, x, y, '~', 'wd');
    }

    // Seaweed.
    for (const wd of weeds) {
      for (let k = 0; k < wd.h; k++) {
        const y = H - 3 - k;
        const sway = Math.sin(t * 0.05 + wd.phase + k * 0.7);
        const x = wd.x + (sway > 0.3 ? 1 : sway < -0.3 ? -1 : 0) * (k > 1 ? 1 : 0);
        put(grid, x, y, k % 2 === 0 ? '(' : ')', 's');
      }
    }

    // Treasure chest.
    const cx = Math.floor(W * 0.72);
    for (let r = 0; r < CHEST.length; r++) {
      putText(grid, cx, H - 3 - (CHEST.length - 1) + r, CHEST[r], 'c');
    }

    // Gravel bed.
    for (let row = 0; row < 2; row++) {
      for (let x = 0; x < W; x++) {
        put(grid, x, H - 2 + row, gravel[row][x], 'g');
      }
    }

    // Food, and crumbs resting on the gravel.
    for (const fl of flakes) put(grid, fl.x, fl.y, '*', 'p');
    for (const c of crumbs) put(grid, c.x, H - 3, '.', 'p');

    // Jellyfish drift behind the fish.
    for (const j of jellies) {
      const rows = j.puff ? JELLY.puff : JELLY.open;
      for (let r = 0; r < rows.length; r++) putText(grid, j.x, j.y + r, rows[r], 'j');
    }

    // Fish (drawn above scenery).
    for (const f of fishes) {
      const y = f.baseY + f.drift + Math.sin(t * f.wob + f.phase) * 1.1;
      const s = f.vx > 0 ? f.sprite.r : f.sprite.l;
      putText(grid, f.x, Math.max(2, Math.min(H - 4, y)), s, f.cls);
    }

    // The big fish, above everyone else.
    if (pred) {
      const y = pred.baseY + pred.drift + Math.sin(t * pred.wob + pred.phase) * 0.8;
      const s = pred.vx > 0 ? (pred.fed > 0 ? BIG.rFed : BIG.r) : (pred.fed > 0 ? BIG.lFed : BIG.l);
      putText(grid, pred.x, Math.max(2, Math.min(H - 4, y)), s, 'f5');
    }

    // The crab, front and center on the gravel.
    if (crab) {
      const s = Math.floor(t / 6) % 2 === 0 ? CRAB.a : CRAB.b;
      putText(grid, crab.x, H - 3, s, 'cr');
    }

    // Bubbles on top.
    for (const b of bubbles) {
      const x = b.x + Math.sin(b.y * 0.5 + b.phase) * 1.2;
      const ch = b.y < 4 ? 'O' : b.age < 14 ? '.' : 'o';
      put(grid, x, b.y, ch, 'b');
    }

    // Serialize with span-grouping.
    let html = '';
    for (let y = 0; y < H; y++) {
      let run = '', runCls = null;
      const flush = () => {
        if (!run) return;
        const esc = run.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        html += runCls ? '<span class="' + runCls + '">' + esc + '</span>' : esc;
        run = '';
      };
      for (let x = 0; x < W; x++) {
        const cell = grid[y][x];
        const cls = cell ? cell.cls : null;
        if (cls !== runCls) { flush(); runCls = cls; }
        run += cell ? cell.ch : ' ';
      }
      flush();
      html += '\n';
    }
    pre.innerHTML = html;
    census.textContent = 'fish ' + fishes.length + '   bubbles ' + bubbles.length + '   gulps ' + gulps;
  }

  function flash(msg) {
    hint.textContent = msg;
    clearTimeout(flash._t);
    flash._t = setTimeout(() => { hint.textContent = 'click tank to feed'; }, 2500);
  }

  function feed(clientX) {
    const rect = wrap.getBoundingClientRect();
    let gx = Math.round((clientX - rect.left - 8) / cellW);
    gx = Math.max(3, Math.min(W - 4, gx));
    for (let i = 0; i < 5; i++) {
      flakes.push({ x: gx + (Math.random() * 6 - 3), y: 1 + Math.random() * 1.5, phase: Math.random() * 6 });
    }
    flash('feeding…');
  }

  wrap.addEventListener('click', (e) => feed(e.clientX));
  wrap.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      const rect = wrap.getBoundingClientRect();
      feed(rect.left + rect.width / 2);
    }
  });

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => { sizeGrid(); render(); }, 150);
  });

  sizeGrid();
  seedFish();
  seedPred();
  seedCrab();
  seedJellies();

  if (reduced) {
    // One composed still frame, no loop.
    for (let i = 0; i < 40; i++) step();
    render();
    hint.textContent = 'animation paused (reduced motion)';
  } else {
    setInterval(() => { step(); render(); }, 90);
  }
})();
</script>
</body>
</html>
